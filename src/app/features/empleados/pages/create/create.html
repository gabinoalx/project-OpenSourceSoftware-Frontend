<app-page-header title="Nuevo Empleado" backRoute="/empleados" />

@if (error()) {
  <div class="mb-4 rounded-[var(--radius)] border border-destructive/50 bg-destructive/10 px-4 py-2 text-sm text-destructive">{{ error() }}</div>
}

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
  <div class="rounded-[var(--radius)] border border-border p-4">
    <h2 class="mb-4 text-sm font-semibold text-foreground">Datos Personales</h2>
    <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
      <div class="space-y-1">
        <label class="text-sm font-medium text-foreground">DNI</label>
        <input type="number" formControlName="dni" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring" />
      </div>
      <div class="space-y-1">
        <label class="text-sm font-medium text-foreground">Nombres</label>
        <input type="text" formControlName="nombres" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring" />
      </div>
      <div class="space-y-1">
        <label class="text-sm font-medium text-foreground">Apellidos</label>
        <input type="text" formControlName="apellidos" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring" />
      </div>
      <div class="space-y-1">
        <label class="text-sm font-medium text-foreground">Edad</label>
        <input type="number" formControlName="edad" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring" />
      </div>
      <div class="space-y-1">
        <label class="text-sm font-medium text-foreground">Sexo</label>
        <select formControlName="sexo" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring">
          <option value="MASCULINO">Masculino</option>
          <option value="FEMENINO">Femenino</option>
        </select>
      </div>
      <div class="space-y-1">
        <label class="text-sm font-medium text-foreground">Fecha de Nacimiento</label>
        <input type="date" formControlName="fechaNacimiento" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring" />
      </div>
      <div class="space-y-1">
        <label class="text-sm font-medium text-foreground">Correo</label>
        <input type="email" formControlName="correo" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring" />
      </div>
      <div class="space-y-1">
        <label class="text-sm font-medium text-foreground">Celular</label>
        <input type="number" formControlName="celular" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring" />
      </div>
      <div class="space-y-1">
        <label class="text-sm font-medium text-foreground">Cargo ID</label>
        <input type="number" formControlName="cargoId" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring" />
      </div>
      <div class="space-y-1">
        <label class="text-sm font-medium text-foreground">Estado</label>
        <select formControlName="estado" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring">
          <option value="ACTIVO">Activo</option>
          <option value="INACTIVO">Inactivo</option>
        </select>
      </div>
      <div class="flex items-center gap-2 pt-6">
        <input type="checkbox" formControlName="asegurado" id="asegurado" class="h-4 w-4 rounded border-input text-primary focus:ring-ring" />
        <label for="asegurado" class="text-sm text-foreground">Asegurado</label>
      </div>
    </div>
  </div>

  <div class="rounded-[var(--radius)] border border-border p-4">
    <h2 class="mb-4 text-sm font-semibold text-foreground">Dirección</h2>
    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
      <div class="space-y-1">
        <label class="text-sm font-medium text-foreground">Departamento</label>
        <input type="text" formControlName="departamento" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring" />
      </div>
      <div class="space-y-1">
        <label class="text-sm font-medium text-foreground">Provincia</label>
        <input type="text" formControlName="provincia" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring" />
      </div>
      <div class="space-y-1">
        <label class="text-sm font-medium text-foreground">Distrito</label>
        <input type="text" formControlName="distrito" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring" />
      </div>
      <div class="space-y-1">
        <label class="text-sm font-medium text-foreground">Domicilio</label>
        <input type="text" formControlName="domicilio" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring" />
      </div>
    </div>
  </div>

  <div class="rounded-[var(--radius)] border border-border p-4">
    <h2 class="mb-4 text-sm font-semibold text-foreground">Examen Médico</h2>
    <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
      <div class="space-y-1">
        <label class="text-sm font-medium text-foreground">Fecha</label>
        <input type="date" formControlName="examenFecha" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring" />
      </div>
      <div class="space-y-1">
        <label class="text-sm font-medium text-foreground">Monto Gastado</label>
        <input type="number" formControlName="examenMonto" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring" />
      </div>
      <div class="flex items-center gap-2 pt-6">
        <input type="checkbox" formControlName="examenAlta" id="examenAlta" class="h-4 w-4 rounded border-input text-primary focus:ring-ring" />
        <label for="examenAlta" class="text-sm text-foreground">Alta</label>
      </div>
    </div>
  </div>

  @if (error()) {
    <div class="rounded-[var(--radius)] border border-destructive/50 bg-destructive/10 px-4 py-2 text-sm text-destructive">{{ error() }}</div>
  }

  <div class="flex items-center gap-3">
    <button type="submit" [disabled]="form.invalid || loading()"
      class="inline-flex h-9 items-center justify-center rounded-[var(--radius)] bg-primary px-6 text-sm font-medium text-primary-foreground shadow-sm transition-colors hover:bg-primary/90 disabled:pointer-events-none disabled:opacity-50">
      {{ loading() ? 'Guardando...' : 'Crear Empleado' }}
    </button>
    <a routerLink="/empleados"
      class="inline-flex h-9 items-center justify-center rounded-[var(--radius)] border border-input bg-background px-6 text-sm font-medium text-foreground shadow-sm transition-colors hover:bg-accent hover:text-accent-foreground">
      Cancelar
    </a>
  </div>
</form>
