<app-page-header title="Editar Documento" backRoute="/documentos" />

@if (loadingData()) {
  <div class="flex items-center justify-center py-16">
    <div class="h-8 w-8 animate-spin rounded-full border-2 border-primary border-t-transparent"></div>
  </div>
} @else {
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
    @if (error()) {
      <div class="rounded-[var(--radius)] border border-destructive/50 bg-destructive/10 px-4 py-2 text-sm text-destructive">{{ error() }}</div>
    }

    <div class="rounded-[var(--radius)] border border-border bg-card">
      <div class="border-b border-border px-4 py-3">
        <h2 class="text-sm font-semibold text-card-foreground">Datos del Documento</h2>
      </div>
      <div class="grid grid-cols-1 gap-4 p-4 md:grid-cols-2">
        <div class="space-y-1">
          <label class="text-sm font-medium text-foreground">Empleado</label>
          <select formControlName="empleadoId" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring">
            <option [ngValue]="0" disabled>Seleccionar empleado</option>
            @for (emp of empleados(); track emp.id) {
              <option [ngValue]="emp.id">{{ emp.nombres }} {{ emp.apellidos }} (DNI: {{ emp.dni }})</option>
            }
          </select>
        </div>
        <div class="space-y-1">
          <label class="text-sm font-medium text-foreground">Tipo de Documento</label>
          <select formControlName="tipoDocumento" class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring">
            <option value="MEDICO">Médico</option>
            <option value="JUDICIAL">Judicial</option>
          </select>
        </div>
        <div class="space-y-1 md:col-span-2">
          <label class="text-sm font-medium text-foreground">Archivo (dejar vacío para mantener el actual)</label>
          <input
            type="file"
            (change)="onFileChange($event)"
            class="flex h-9 w-full rounded-[var(--radius)] border border-input bg-background px-3 text-sm shadow-sm transition-colors file:mr-2 file:rounded file:border-0 file:bg-primary/10 file:px-2 file:py-0.5 file:text-xs file:font-medium file:text-primary focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring"
          />
          @if (selectedFile()) {
            <p class="mt-1 text-xs text-muted-foreground">{{ selectedFile()!.name }}</p>
          }
        </div>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <button type="submit" [disabled]="form.invalid || loading()"
        class="inline-flex h-9 items-center justify-center rounded-[var(--radius)] bg-primary px-6 text-sm font-medium text-primary-foreground shadow-sm transition-colors hover:bg-primary/90 disabled:pointer-events-none disabled:opacity-50">
        {{ loading() ? 'Guardando...' : 'Actualizar Documento' }}
      </button>
      <a routerLink="/documentos"
        class="inline-flex h-9 items-center justify-center rounded-[var(--radius)] border border-input bg-background px-6 text-sm font-medium text-foreground shadow-sm transition-colors hover:bg-accent hover:text-accent-foreground">
        Cancelar
      </a>
    </div>
  </form>
}
