<div class="flex h-screen bg-background">
  <aside
    [class.w-56]="!collapsed()"
    [class.w-16]="collapsed()"
    class="flex flex-col border-r border-border bg-card transition-all duration-200"
  >
    <div class="flex h-14 items-center border-b border-border px-4">
      @if (!collapsed()) {
        <span class="text-sm font-semibold text-card-foreground">Sistema RRHH</span>
      }
      <button
        (click)="collapsed.set(!collapsed())"
        class="ml-auto inline-flex h-7 w-7 items-center justify-center rounded-(--radius) text-muted-foreground hover:bg-accent hover:text-accent-foreground"
      >
        @if (collapsed()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        }
      </button>
    </div>

    <nav class="flex-1 space-y-1 overflow-y-auto p-2">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-accent text-accent-foreground font-medium"
          [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
          class="flex items-center gap-3 rounded-(--radius) px-3 py-2 text-sm text-muted-foreground transition-colors hover:bg-accent hover:text-accent-foreground"
          [title]="collapsed() ? item.label : ''"
        >
          <span class="flex h-4 w-4 items-center justify-center rounded bg-primary/10 text-[10px] font-bold text-primary">
            {{ item.label.charAt(0) }}
          </span>
          @if (!collapsed()) {
            <span>{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <div class="border-t border-border">
      @if (!collapsed()) {
        <div class="flex items-center gap-3 px-4 py-3">
          <span class="flex h-8 w-8 items-center justify-center rounded-full bg-primary text-sm font-semibold text-primary-foreground">
            {{ userName.charAt(0) }}
          </span>
          <div class="min-w-0 flex-1">
            <p class="truncate text-sm font-medium text-foreground">{{ userName }}</p>
            <p class="truncate text-xs text-muted-foreground">{{ userRole }}</p>
          </div>
        </div>
      }
      <div class="px-2 pb-2">
        <button
          (click)="logout()"
          class="flex w-full items-center gap-3 rounded-(--radius) px-3 py-2 text-sm text-muted-foreground transition-colors hover:bg-destructive/10 hover:text-destructive"
          [title]="collapsed() ? 'Cerrar sesión' : ''"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
          @if (!collapsed()) {
            <span>Cerrar sesión</span>
          }
        </button>
      </div>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto p-6">
    <router-outlet />
  </main>
</div>
